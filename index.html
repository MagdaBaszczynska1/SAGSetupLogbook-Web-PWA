<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#168b2b">
  <meta name="description" content="SAG Setup Logbook — kalkulator SAG, historia pomiarów i lokalny dziennik ustawień zawieszenia.">
  <meta name="application-name" content="SAG Setup Logbook">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="SAG Logbook">
  <title>SAG Setup Logbook</title>
  <script>
    try {
      const saved = JSON.parse(localStorage.getItem("sagSetupLogbookWeb.settings.v1") || "null");
      if (saved && (saved.appearanceMode === "light" || saved.appearanceMode === "dark")) {
        document.documentElement.dataset.theme = saved.appearanceMode;
      }
    } catch {}
  </script>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon-512.svg" type="image/svg+xml">
  <link rel="icon" href="./icons/icon-192.png" type="image/png" sizes="192x192">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./src/styles/index.css">
</head>
<body>
  <div id="app"></div>
  <noscript>
    <p class="noscript-message">Ta aplikacja wymaga włączonego JavaScriptu.</p>
  </noscript>
  <script type="module" src="./src/app/main.js"></script>
</body>
</html>
